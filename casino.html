<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ErgoSphere Sportsbook</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav id="navbar">
    <button><a href="index.html">HOME</a></button>
    <button><a href="refreshments.html">REFRESHMENTS</a></button>
    <button><a href="MODS.html">MODS</a></button>
    <button><a href="casino.html">CASINO</a></button>
    <button><a href="contracts.html">CONTRACTS</a></button>
  </nav>
  <hr>
  <header>
    <h1>ErgoSphere Sportsbook</h1>
  </header>
  <hr>
  <main>
    <div id="league-selection">
      <label for="league">League:</label>
      <select id="league" onchange="updateTeamsAndLines()">
        <option value="">Select League</option>
        <option value="NFL">NFL</option>
        <option value="WNBA">WNBA</option>
        <option value="NBA">NBA</option>
      </select>
    </div>
    <div id="team-selection">
      <label for="ourTeam">Our Team:</label>
      <select id="ourTeam" onchange="updateLines()">
        <option value="">Select Team</option>
      </select>
    </div>
    <div id="bet-selection">
      <h2>Bets</h2>
      <div id="bet-lines">
        <div class="bet-entry">
          <label for="category1">Category:</label>
          <select id="category1" class="category-select" onchange="updatePlayerOptions(1)">
            <option value="">Select Category</option>
          </select>
          <label for="line1">Bet Line:</label>
          <select id="line1" class="line-select">
            <option value="">Select Line</option>
          </select>
          <label for="player1">Player:</label>
          <select id="player1" class="player-input">
            <option value="">Select Player</option>
          </select>
        </div>
        <div class="bet-entry">
          </div>
        <div class="bet-entry">
          </div>
      </div>
    </div>
    <button id="submit-bets" onclick="submitBets()">Submit Bets</button>
    <div id="receipt">
      <h2>Receipt</h2>
      <pre id="receipt-content"></pre>
    </div>
  </main>
  <script src="casino.js"></script>
</body>
</html>
